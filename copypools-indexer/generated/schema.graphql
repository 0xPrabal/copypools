}

type Query {
  position(id: String!): position
  positions(where: positionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): positionPage!
  rangeMoveEvent(id: String!): rangeMoveEvent
  rangeMoveEvents(where: rangeMoveEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): rangeMoveEventPage!
  closeEvent(id: String!): closeEvent
  closeEvents(where: closeEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): closeEventPage!
  compoundEvent(id: String!): compoundEvent
  compoundEvents(where: compoundEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): compoundEventPage!
  _meta: Meta
}


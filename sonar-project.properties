# SonarCloud Configuration
sonar.projectKey=pools_copypools
sonar.organization=pools

# Project info
sonar.projectName=Copypools
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=packages/frontend/src,packages/backend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.spec.ts,**/dist/**,**/.next/**,**/coverage/**

# TypeScript/JavaScript
sonar.typescript.tsconfigPaths=packages/frontend/tsconfig.json,packages/backend/tsconfig.json

# Coverage (if you add tests)
sonar.javascript.lcov.reportPaths=packages/frontend/coverage/lcov.info,packages/backend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
